<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>finmodel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- ── Sidebar ─────────────────────────────────────────────── -->
    <nav id="sidebar" aria-label="Conversations">
      <div class="sidebar-brand">
        <span class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <rect x="1.5" y="1.5" width="15" height="15" rx="3.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5 12.5V8.5M9 12.5V5.5M13 12.5V9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="brand-name">finmodel</span>
        </span>
        <button type="button" id="sidebarToggle" class="icon-btn" aria-label="Collapse sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
        </button>
      </div>

      <button type="button" id="newChatBtn" class="btn-primary new-chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>

      <div id="convList" class="conv-list"></div>

      <div class="sidebar-foot">
        <button type="button" id="themeToggle" class="icon-btn" aria-label="Toggle theme"></button>
        <button type="button" id="settingsBtn" class="icon-btn" aria-label="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button type="button" id="footUpdateBtn" class="foot-update" data-state="idle">
          <span id="footUpdateText">Check for updates</span>
        </button>
      </div>
    </nav>

    <!-- ── Chat main ───────────────────────────────────────────── -->
    <main id="chatMain">
      <div id="updateBanner" class="update-banner" hidden>
        <span id="updateBannerText"></span>
        <span class="update-banner-actions">
          <button type="button" id="updateInstallBtn" class="btn-primary">Install</button>
          <button type="button" id="updateDismiss" class="btn-ghost">Later</button>
        </span>
      </div>

      <div id="chatScroll" class="chat-scroll">
        <section id="chatEmpty" class="chat-empty">
          <h1 class="greeting">What are we analyzing today?</h1>
          <div class="example-chips">
            <button type="button" class="example-chip">Build a 3-statement model for AAPL</button>
            <button type="button" class="example-chip">Benchmark AAPL, MSFT, GOOGL</button>
            <button type="button" class="example-chip">Search the web for Nestlé margin trends</button>
            <button type="button" class="example-chip">Research the Figma / Adobe deal</button>
          </div>
        </section>
      </div>

      <div id="composer" class="composer">
        <div class="composer-box">
          <textarea id="chatInput" rows="1" placeholder="Ask finmodel to build, benchmark, research, or read…" aria-label="Message"></textarea>
          <div class="composer-btns">
            <button type="button" id="chatStop" class="icon-btn" aria-label="Stop" hidden>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            </button>
            <button type="button" id="chatSend" class="btn-primary send-btn" aria-label="Send">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
          </div>
        </div>
        <button type="button" id="modelPill" class="model-pill" title="Change model in Settings">
          <span id="modelPillText">model</span>
        </button>
      </div>
    </main>

    <!-- ── Reader panel ────────────────────────────────────────── -->
    <aside id="readerPanel" class="reader-panel" aria-label="Reader" hidden>
      <header class="reader-head">
        <div class="reader-titles">
          <span id="readerTitle" class="reader-title"></span>
          <a id="readerUrl" href="#" class="reader-url num"></a>
        </div>
        <div class="reader-head-actions">
          <button type="button" id="readerCopy" class="btn-ghost">Copy link</button>
          <button type="button" id="readerOpen" class="btn-ghost">Open in browser ↗</button>
          <button type="button" id="readerClose" class="icon-btn" aria-label="Close reader">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </header>
      <input id="readerFind" class="reader-find" type="search" placeholder="Find on page…" hidden />
      <div id="readerBody" class="reader-body"></div>
    </aside>
  </div>

  <!-- floating expand button (visible only when the sidebar is collapsed) -->
  <button type="button" id="sidebarExpand" class="sidebar-expand" aria-label="Expand sidebar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
  </button>

  <!-- ── Settings modal ─────────────────────────────────────────── -->
  <div id="settingsModal" class="modal" hidden>
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Settings">
      <div class="modal-head">
        <h2>Settings</h2>
        <button type="button" id="settingsClose" class="icon-btn" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="settingsStatus" class="status" hidden></div>
      <div class="modal-body">
        <label class="field">
          <span class="field-label">OpenRouter API key</span>
          <input id="apiKey" type="password" autocomplete="off" placeholder="sk-or-…" />
          <span id="keyStatus" class="field-hint"></span>
        </label>
        <label class="field">
          <span class="field-label">Model</span>
          <span class="field-row">
            <select id="modelSelect"></select>
            <button type="button" id="refreshModels" class="btn-ghost">Refresh</button>
          </span>
        </label>
        <label class="field">
          <span class="field-label">Theme</span>
          <select id="themeSelect">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </label>
        <label class="field">
          <span class="field-label">EDGAR contact email</span>
          <input id="edgarContact" type="email" placeholder="you@example.com" />
        </label>
        <label class="field">
          <span class="field-label">Output folder</span>
          <span class="field-row">
            <input id="outDir" type="text" placeholder="Documents/finmodel" />
            <button type="button" id="chooseOutDir" class="btn-ghost">Choose…</button>
          </span>
        </label>
        <label class="field">
          <span class="field-label">Roam MCP command (optional)</span>
          <span class="field-row">
            <input id="mcpCommand" type="text" placeholder="roam mcp serve" />
            <button type="button" id="testMcp" class="btn-ghost">Test</button>
          </span>
          <span id="mcpStatus" class="field-hint"></span>
        </label>
      </div>
      <div class="modal-foot">
        <span id="appVersion" class="app-version num"></span>
        <span class="modal-foot-btns">
          <button type="button" id="removeKey" class="btn-ghost">Remove key</button>
          <button type="button" id="saveSettings" class="btn-primary">Save</button>
        </span>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.mjs"></script>
</body>
</html>
