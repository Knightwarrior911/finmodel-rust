<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- finmodel mark: ledger-indigo tile, ascending bars, trend tick.
       Source of truth for `cargo tauri icon` (regenerates icons/). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>
  <!-- baseline hairline -->
  <rect x="232" y="744" width="560" height="14" rx="7" fill="#ffffff" opacity="0.42"/>
  <!-- ascending bars -->
  <rect x="252" y="560" width="104" height="164" rx="26" fill="#ffffff" opacity="0.62"/>
  <rect x="392" y="472" width="104" height="252" rx="26" fill="#ffffff" opacity="0.80"/>
  <rect x="532" y="384" width="104" height="340" rx="26" fill="#ffffff" opacity="0.92"/>
  <rect x="672" y="276" width="104" height="448" rx="26" fill="#ffffff"/>
  <!-- trend tick -->
  <path d="M 268 476 L 444 388 L 584 300 L 700 212" fill="none"
        stroke="#c7d2fe" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="700" cy="212" r="30" fill="#c7d2fe"/>
</svg>
