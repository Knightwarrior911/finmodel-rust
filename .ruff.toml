line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "I", "N", "W"]
# Pre-existing issues — suppress to keep CI green while allowing targeted fixes
ignore = [
    "E402",  # module-import-not-at-top-of-file (pre-existing throughout)
    "E501",  # line-too-long
    "E701",  # multiple-statements-on-one-line-colon (pre-existing)
    "E702",  # multiple-statements-on-one-line-semicolon (pre-existing)
    "E722",  # bare-except (pre-existing)
    "E731",  # lambda-assignment (pre-existing)
    "E741",  # ambiguous-variable-name (pre-existing)
    "F401",  # unused-import (pre-existing)
    "F541",  # f-string-missing-placeholders (pre-existing)
    "F841",  # unused-variable (pre-existing)
    "I001",  # unsorted-imports (pre-existing)
    "N802",  # invalid-function-name (pre-existing)
    "N803",  # invalid-argument-name (pre-existing)
    "N806",  # non-lowercase-variable-in-function (pre-existing)
    "N814",  # camelcase-imported-as-constant (pre-existing)
    "N817",  # camelcase-imported-as-acronym (pre-existing)
    "N818",  # error-suffix-on-exception-name (pre-existing)
    "W293",  # blank-line-with-whitespace (pre-existing)
    "W605",  # invalid-escape-sequence (pre-existing)
]

[lint.per-file-ignores]
"tests/*" = ["E402", "E501", "N802", "N806"]
# Forward-reference string annotations with deferred imports — false positives
"src/peers.py" = ["F821"]
"src/public_comps.py" = ["F821"]
"src/extractor.py" = ["F821"]
